# =============================================================================
# SAO BEHAVIORAL MODEL (Subject-Action-Object)
# Integrated from skill-audit Agent/Skill Security Knowledge Base
# Purpose: Structured behavior enumeration for P5 STRIDE analysis of agent targets
# =============================================================================

sao_behavioral_model:
  description: |
    The SAO (Subject-Action-Object) behavioral taxonomy provides a structured
    framework for enumerating agent/skill behaviors during STRIDE analysis.
    When analyzing agent-type DFD elements in Phase 5, use SAO triples to
    systematically identify threats: "What SUBJECT performs what ACTION on what OBJECT?"
  usage_guidance: |
    During P5 STRIDE analysis, for each agent/skill/MCP element:
    1. Identify applicable Subjects from the element type
    2. Enumerate Actions the element can perform
    3. Map target Objects that could be affected
    4. For each SAO triple, evaluate STRIDE categories
    5. Cross-reference with attack_chains below for multi-step threats

  subjects:
    S_CODE:
      description: "Executable code within a skill or tool"
      applicable_elements: ["process", "skill_template"]
      example: "Python script in skill definition"
    S_PROMPT:
      description: "Prompt or instruction content"
      applicable_elements: ["skill_template", "agent_core"]
      example: "System prompt, skill instructions"
    S_METADATA:
      description: "Skill/tool metadata (frontmatter, descriptions)"
      applicable_elements: ["skill_template", "mcp_server"]
      example: "YAML frontmatter, tool description field"
    S_DEPENDENCY:
      description: "External package or dependency"
      applicable_elements: ["skill_template", "mcp_server"]
      example: "npm package, pip dependency"
    S_ENCODED:
      description: "Encoded or obfuscated content"
      applicable_elements: ["skill_template", "data_flow"]
      example: "Base64-encoded payload, Unicode tricks"
    S_NETWORK:
      description: "Network operation or request"
      applicable_elements: ["process", "mcp_server"]
      example: "HTTP request, WebSocket connection"
    S_TOOL:
      description: "Agent tool invocation"
      applicable_elements: ["mcp_server", "agent_core"]
      example: "Bash tool call, file write operation"
    S_AGENT:
      description: "Agent or sub-agent instance"
      applicable_elements: ["agent_core", "multi_agent_orchestrator"]
      example: "Spawned sub-agent, delegated task"

  actions:
    A_EXEC:
      description: "Execute code or commands"
      stride: ["tampering", "elevation_of_privilege"]
      related_tcs: ["TC-01"]
    A_DOWNLOAD:
      description: "Fetch remote content"
      stride: ["tampering"]
      related_tcs: ["TC-04"]
    A_EXFIL:
      description: "Send data to external endpoint"
      stride: ["information_disclosure"]
      related_tcs: ["TC-03"]
    A_ACCESS:
      description: "Read sensitive resources"
      stride: ["information_disclosure", "spoofing"]
      related_tcs: ["TC-02", "TC-11"]
    A_ENCODE:
      description: "Encode, obfuscate, or encrypt data"
      stride: ["repudiation", "tampering"]
      related_tcs: ["TC-06", "TC-13"]
    A_PERSIST:
      description: "Establish persistent access"
      stride: ["tampering"]
      related_tcs: ["TC-08"]
    A_INJECT:
      description: "Inject content, instructions, or code"
      stride: ["tampering", "elevation_of_privilege", "spoofing"]
      related_tcs: ["TC-05", "TC-09", "TC-10"]
    A_INSTALL:
      description: "Install packages or dependencies"
      stride: ["tampering", "elevation_of_privilege"]
      related_tcs: ["TC-07"]
    A_ESCALATE:
      description: "Elevate privileges or capabilities"
      stride: ["elevation_of_privilege"]
      related_tcs: ["TC-09"]
    A_DISCOVER:
      description: "Enumerate or probe for information"
      stride: ["information_disclosure"]
      related_tcs: ["TC-14"]
    A_MANIPULATE:
      description: "Modify configuration or settings"
      stride: ["tampering"]
      related_tcs: ["TC-09"]
    A_DELEGATE:
      description: "Delegate task to another agent or tool"
      stride: ["elevation_of_privilege", "spoofing"]
      related_tcs: ["TC-09"]
    A_SCHEDULE:
      description: "Schedule deferred or recurring task"
      stride: ["tampering"]
      related_tcs: ["TC-08"]

  objects:
    O_CREDENTIAL:
      description: "SSH keys, API tokens, passwords, env vars"
      sensitivity: "critical"
      related_controls: ["AGENT-03"]
    O_SYSTEM:
      description: "Operating system, shell, file system"
      sensitivity: "critical"
      related_controls: ["AGENT-02", "AGENT-08"]
    O_LLM:
      description: "The LLM agent itself (context, memory, behavior)"
      sensitivity: "critical"
      related_controls: ["AGENT-01", "AGENT-04"]
    O_MCP_SERVER:
      description: "MCP server definitions and tool registrations"
      sensitivity: "high"
      related_controls: ["AGENT-02", "AGENT-10"]
    O_SKILL:
      description: "Skill definitions, prompt templates"
      sensitivity: "high"
      related_controls: ["AGENT-09", "AGENT-10"]
    O_ENDPOINT:
      description: "External network endpoints (URLs, APIs)"
      sensitivity: "high"
      related_controls: ["AGENT-02"]
    O_SHELLPROFILE:
      description: "Shell profiles (.bashrc, .zshrc, .profile)"
      sensitivity: "critical"
      related_controls: ["AGENT-02", "AGENT-08"]
    O_CRONTAB:
      description: "Scheduled tasks (cron, systemd timers)"
      sensitivity: "high"
      related_controls: ["AGENT-02"]
    O_MEMORY:
      description: "Agent persistent memory and context store"
      sensitivity: "high"
      related_controls: ["AGENT-04"]
    O_REGISTRY:
      description: "Package registries (npm, pip, cargo)"
      sensitivity: "medium"
      related_controls: ["AGENT-10"]
    O_DATABASE:
      description: "Databases, key-value stores, browser storage"
      sensitivity: "high"
      related_controls: ["AGENT-04"]
    O_CICD:
      description: "CI/CD pipelines and deployment configs"
      sensitivity: "critical"
      related_controls: ["AGENT-02", "AGENT-10"]
    O_AGENT:
      description: "Other agent instances in multi-agent systems"
      sensitivity: "high"
      related_controls: ["AGENT-05"]
    O_USER:
      description: "Human user (trust exploitation target)"
      sensitivity: "critical"
      related_controls: ["AGENT-08"]

# =============================================================================
# AGENT ATTACK CHAINS
# Integrated from skill-audit Agent/Skill Security Knowledge Base
# Purpose: Pre-built multi-step attack sequences for P6 attack path validation
# =============================================================================

agent_attack_chains:
  description: |
    Pre-built attack chain patterns for agent/skill environments. Use these
    during Phase 6 (Risk Validation) to validate attack paths and design POCs.
    Each chain represents a realistic multi-step attack using MITRE ATT&CK
    technique sequences.

  chains:
    CHAIN_001:
      name: "Credential Theft & Exfiltration"
      description: "Skill reads credentials, obfuscates, and exfiltrates"
      attack_techniques: ["T1552", "T1027", "T1041"]
      kill_chain: ["credential_access", "defense_evasion", "exfiltration"]
      sao_sequence:
        - "S_CODE → A_ACCESS → O_CREDENTIAL"
        - "S_ENCODED → A_ENCODE → O_CREDENTIAL"
        - "S_NETWORK → A_EXFIL → O_ENDPOINT"
      related_asi: ["ASI03", "ASI05"]
      severity: "critical"

    CHAIN_002:
      name: "Download & Execute"
      description: "Fetch remote payload and execute locally"
      attack_techniques: ["T1105", "T1059"]
      kill_chain: ["delivery", "exploitation"]
      sao_sequence:
        - "S_NETWORK → A_DOWNLOAD → O_ENDPOINT"
        - "S_CODE → A_EXEC → O_SYSTEM"
      related_asi: ["ASI05", "ASI04"]
      severity: "critical"

    CHAIN_003:
      name: "Staged Payload"
      description: "Download, decode hidden payload, execute"
      attack_techniques: ["T1105", "T1140", "T1059"]
      kill_chain: ["delivery", "defense_evasion", "exploitation"]
      sao_sequence:
        - "S_NETWORK → A_DOWNLOAD → O_ENDPOINT"
        - "S_ENCODED → A_ENCODE → O_SYSTEM"
        - "S_CODE → A_EXEC → O_SYSTEM"
      related_asi: ["ASI05"]
      severity: "critical"

    CHAIN_004:
      name: "Supply Chain Poisoning"
      description: "Install trojanized package, execute payload, exfiltrate"
      attack_techniques: ["T1195", "T1059", "T1041"]
      kill_chain: ["delivery", "exploitation", "exfiltration"]
      sao_sequence:
        - "S_DEPENDENCY → A_INSTALL → O_REGISTRY"
        - "S_CODE → A_EXEC → O_SYSTEM"
        - "S_NETWORK → A_EXFIL → O_ENDPOINT"
      related_asi: ["ASI04", "ASI05"]
      severity: "critical"

    CHAIN_005:
      name: "Prompt Injection to Code Execution"
      description: "Inject prompt to manipulate agent into executing code"
      attack_techniques: ["T1566", "T1059"]
      kill_chain: ["delivery", "exploitation"]
      sao_sequence:
        - "S_PROMPT → A_INJECT → O_LLM"
        - "S_TOOL → A_EXEC → O_SYSTEM"
      related_asi: ["ASI01", "ASI05"]
      severity: "high"

    CHAIN_006:
      name: "Persistence Installation"
      description: "Download payload, install persistence, execute on schedule"
      attack_techniques: ["T1105", "T1546.004", "T1059"]
      kill_chain: ["delivery", "installation", "persistence"]
      sao_sequence:
        - "S_NETWORK → A_DOWNLOAD → O_ENDPOINT"
        - "S_CODE → A_PERSIST → O_SHELLPROFILE"
        - "S_CODE → A_SCHEDULE → O_CRONTAB"
      related_asi: ["ASI05", "ASI02"]
      severity: "high"

    CHAIN_007:
      name: "MCP Tool Poisoning Chain"
      description: "Poison tool description to inject prompt, hijack agent goals"
      attack_techniques: ["T1036", "T1059"]
      kill_chain: ["installation", "exploitation"]
      sao_sequence:
        - "S_METADATA → A_MANIPULATE → O_MCP_SERVER"
        - "S_PROMPT → A_INJECT → O_LLM"
        - "S_TOOL → A_ESCALATE → O_SYSTEM"
      related_asi: ["ASI01", "ASI02"]
      related_mcp: ["MCP01", "MCP03"]
      severity: "critical"

    CHAIN_008:
      name: "Cross-Skill Contamination"
      description: "Malicious skill poisons shared context to compromise other skills"
      attack_techniques: ["T1565", "T1059"]
      kill_chain: ["installation", "lateral_movement"]
      sao_sequence:
        - "S_CODE → A_MANIPULATE → O_MEMORY"
        - "S_AGENT → A_DELEGATE → O_SKILL"
        - "S_PROMPT → A_INJECT → O_LLM"
      related_asi: ["ASI06", "ASI02"]
      severity: "high"

    CHAIN_009:
      name: "Stealth Exfiltration"
      description: "Obfuscate data, split across channels, exfiltrate"
      attack_techniques: ["T1027", "T1059", "T1041", "T1048"]
      kill_chain: ["defense_evasion", "exploitation", "exfiltration"]
      sao_sequence:
        - "S_ENCODED → A_ENCODE → O_CREDENTIAL"
        - "S_CODE → A_EXEC → O_SYSTEM"
        - "S_NETWORK → A_EXFIL → O_ENDPOINT"
      related_asi: ["ASI03", "ASI05"]
      severity: "critical"

    CHAIN_010:
      name: "Full Kill Chain"
      description: "Download → execute → steal credentials → exfiltrate"
      attack_techniques: ["T1105", "T1059", "T1552", "T1041"]
      kill_chain: ["delivery", "exploitation", "credential_access", "exfiltration"]
      sao_sequence:
        - "S_NETWORK → A_DOWNLOAD → O_ENDPOINT"
        - "S_CODE → A_EXEC → O_SYSTEM"
        - "S_CODE → A_ACCESS → O_CREDENTIAL"
        - "S_NETWORK → A_EXFIL → O_ENDPOINT"
      related_asi: ["ASI04", "ASI05", "ASI03"]
      severity: "critical"

    CHAIN_011:
      name: "Delegation Chain Abuse"
      description: "Exploit agent delegation to escalate privileges across trust boundaries"
      attack_techniques: ["T1134", "T1078"]
      kill_chain: ["privilege_escalation", "lateral_movement"]
      sao_sequence:
        - "S_AGENT → A_DELEGATE → O_AGENT"
        - "S_TOOL → A_ESCALATE → O_SYSTEM"
        - "S_CODE → A_EXEC → O_SYSTEM"
      related_asi: ["ASI03", "ASI07"]
      severity: "critical"

    CHAIN_012:
      name: "Social Engineering via Agent"
      description: "Manipulate agent to socially engineer human user"
      attack_techniques: ["T1566", "T1204"]
      kill_chain: ["delivery", "exploitation"]
      sao_sequence:
        - "S_PROMPT → A_INJECT → O_LLM"
        - "S_AGENT → A_MANIPULATE → O_USER"
      related_asi: ["ASI09", "ASI01"]
      severity: "high"

    CHAIN_013:
      name: "Inject → Persist → Execute"
      description: "Prompt injection establishes persistence, then executes on trigger"
      attack_techniques: ["T1566", "T1546.004", "T1059"]
      kill_chain: ["delivery", "installation", "exploitation"]
      sao_sequence:
        - "S_PROMPT → A_INJECT → O_LLM"
        - "S_CODE → A_PERSIST → O_SHELLPROFILE"
        - "S_CODE → A_EXEC → O_SYSTEM"
      related_asi: ["ASI01", "ASI05"]
      severity: "high"

# =============================================================================
# TRUST INVERSION MODEL
# Integrated from skill-audit Agent/Skill Security Knowledge Base
# Purpose: Formalize the trust inversion paradigm for P3 trust boundary analysis
# =============================================================================

trust_inversion_model:
  description: |
    In traditional application security, application code is TRUSTED and user
    input is UNTRUSTED. In agent/skill systems, this model is INVERTED:
    the skill instructions themselves (SKILL.MD) are the primary attack surface.
    This model formalizes trust levels for P3 Trust Boundary analysis.

  principle: |
    "Code provenance determines trust. Skills are downloaded/installed artifacts
    with potentially adversarial content — treat them as UNTRUSTED input, not
    as TRUSTED application code."

  trust_levels:
    UNTRUSTED:
      description: "Content that may be adversarial; must be validated before use"
      examples:
        - "SKILL.MD content and instructions"
        - "MCP tool outputs (may contain injected content)"
        - "Cross-skill shared state (other skills may be compromised)"
        - "User-provided prompt inputs"
        - "Downloaded/fetched external content"
        - "Package dependencies from public registries"
      threat_model: "Assume adversarial. Validate everything."
      related_asi: ["ASI01", "ASI04", "ASI06"]

    SEMI_TRUSTED:
      description: "Content from verified sources with limited trust scope"
      examples:
        - "Tool calls initiated by user (user intended, but tool may misbehave)"
        - "Agent memory (verified but may have been poisoned in prior sessions)"
        - "MCP servers from allowlisted sources (verified provenance)"
        - "Signed skill templates (verified publisher)"
      threat_model: "Verify provenance. Monitor behavior. Limit scope."
      related_asi: ["ASI02", "ASI03"]

    TRUSTED:
      description: "Core system components with verified integrity"
      examples:
        - "Agent runtime/framework (Claude Code, etc.)"
        - "System prompt (hardcoded, not user-modifiable)"
        - "Permission system (HITL gates, tool allowlists)"
        - "Audit logging infrastructure"
      threat_model: "Protect integrity. Monitor for compromise."
      related_asi: ["ASI08", "ASI10"]

  trust_boundaries_for_p3:
    - name: "Skill Loading Boundary"
      from: "UNTRUSTED (skill content)"
      to: "SEMI_TRUSTED (agent context)"
      crossing_risks:
        - "Prompt injection via skill instructions"
        - "Malicious code in skill hooks"
        - "Supply chain poisoning via skill dependencies"
      controls: ["AGENT-09", "AGENT-10"]

    - name: "Tool Execution Boundary"
      from: "SEMI_TRUSTED (agent decision)"
      to: "TRUSTED (system resources)"
      crossing_risks:
        - "Tool argument injection"
        - "Capability escalation"
        - "Unauthorized resource access"
      controls: ["AGENT-02", "AGENT-08"]

    - name: "Tool Output Boundary"
      from: "UNTRUSTED (tool response)"
      to: "SEMI_TRUSTED (agent context)"
      crossing_risks:
        - "Indirect prompt injection via tool output"
        - "Data poisoning"
        - "Response manipulation"
      controls: ["AGENT-01", "AGENT-02"]

    - name: "Inter-Agent Boundary"
      from: "SEMI_TRUSTED (peer agent)"
      to: "SEMI_TRUSTED (this agent)"
      crossing_risks:
        - "Agent impersonation"
        - "Message tampering"
        - "Trust propagation abuse"
      controls: ["AGENT-05", "AGENT-03"]

    - name: "Memory Persistence Boundary"
      from: "SEMI_TRUSTED (current session)"
      to: "SEMI_TRUSTED (persisted memory)"
      crossing_risks:
        - "Memory poisoning for future sessions"
        - "Cross-session data leakage"
        - "Context manipulation"
      controls: ["AGENT-04"]

    - name: "Human-Agent Boundary"
      from: "TRUSTED (human judgment)"
      to: "SEMI_TRUSTED (agent action)"
      crossing_risks:
        - "Confirmation fatigue exploitation"
        - "Social engineering through agent"
        - "Authority impersonation"
      controls: ["AGENT-08"]
